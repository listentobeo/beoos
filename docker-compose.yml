services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beoos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - beoos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d beoos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  beoos-postgres:

